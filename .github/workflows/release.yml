name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist/whois
          go build -trimpath -ldflags="-w -s" -o dist/whois/whois ./main
          cp LICENSE README.md start.sh dist/whois/
          chmod +x dist/whois/whois dist/whois/start.sh

      - name: Package release asset
        run: |
          tar -C dist -czf whois-linux-amd64.tar.gz whois

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: whois-linux-amd64.tar.gz
